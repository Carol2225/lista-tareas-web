<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista de Tareas</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="container">
    <h1>Lista de Tareas</h1>
    <p class="subtitle">Organiza tus tareas diarias</p>

    <section class="task-form">
      <input
        type="text"
        id="taskInput"
        placeholder="Escribe una tarea..."
        maxlength="100"
        aria-label="Nueva tarea"
      >
      <button id="addTaskBtn" type="button">Añadir</button>
    </section>

    <section class="toolbar">
      <div class="filters">
        <button type="button" class="filter-btn active" data-filter="all">Todas</button>
        <button type="button" class="filter-btn" data-filter="pending">Pendientes</button>
        <button type="button" class="filter-btn" data-filter="completed">Completadas</button>
      </div>

      <button id="clearCompletedBtn" type="button" class="clear-btn">
        Borrar completadas
      </button>
    </section>

    <section class="stats">
      <p id="totalTasks">Total: 0</p>
      <p id="pendingTasks">Pendientes: 0</p>
      <p id="completedTasks">Completadas: 0</p>
    </section>

    <ul id="taskList" class="task-list"></ul>
  </main>

  <script src="script.js"></script>
</body>
</html>
